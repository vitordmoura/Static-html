<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Buscar - PortfolioDev</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; }
        h2 { color: #e67e22; }
        input, button { padding: 10px; margin: 5px; }
        button { background: #e67e22; color: #fff; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h2>🔍 Buscar Projetos</h2>
    <form>
        <input id="q" name="q" placeholder="Buscar...">
        <button type="submit">Buscar</button>
    </form>
    <div id="resultado"></div>
    <p><a href="index.html">Voltar</a></p>

    <script>
        // ❌ VULNERABILIDADE PROPOSITAL: query refletida via innerHTML (XSS)
        const params = new URLSearchParams(window.location.search);
        const q = params.get('q');
        if (q) {
            document.getElementById('q').value = q;
            // XSS: insere conteúdo do usuário diretamente no HTML
            document.getElementById('resultado').innerHTML =
                "<p>Você buscou: <strong>" + q + "</strong></p>" +
                "<p>Nenhum resultado encontrado.</p>";
        }
    </script>
</body>
</html>
