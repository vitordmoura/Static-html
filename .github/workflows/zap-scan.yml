name: 🔐 OWASP ZAP Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  zap-scan:
    name:  OWASP ZAP Baseline Scan — PortfolioDev (HTML estático)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: Iniciar aplicação
        run: |
          python3 -m http.server 8080 &
          sleep 3
          curl -f http://localhost:8080 || (echo "App não respondeu!" && exit 1)
          echo "✅ App rodando em http://localhost:8080"

      - name: 📁 Criar pasta de relatórios
        run: mkdir -p zap-reports && chmod 777 zap-reports

      - name: 🕷️ Executar OWASP ZAP
        run: |
          docker run --rm --network host \
            -v $(pwd)/zap-reports:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
              -t http://localhost:8080 \
              -r zap-report.html \
              -J zap-report.json \
              -I
        continue-on-error: true

      - name: 📊 Analisar relatório
        run: |
          echo "════════════════════════════════════════"
          echo "   📊 ANÁLISE DO RELATÓRIO OWASP ZAP"
          echo "════════════════════════════════════════"
          if [ ! -f "zap-reports/zap-report.json" ]; then
            echo "⚠️ Relatório não encontrado"
            ls -la zap-reports/
            exit 0
          fi
          python3 analyze_zap.py

      - name: 📄 Salvar relatório como artefato
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-security-report
          path: zap-reports/
          retention-days: 30
