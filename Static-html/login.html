<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login - PortfolioDev</title>
    <style>
        body { font-family: Arial; max-width: 400px; margin: 100px auto; padding: 20px; }
        h2 { color: #e67e22; }
        input, button { padding: 10px; margin: 5px; width: 90%; }
        button { background: #e67e22; color: #fff; border: none; cursor: pointer; }
        .err { color: red; }
    </style>
</head>
<body>
    <h2>🔒 Login</h2>
    <div id="msg"></div>

    <!-- ❌ VULNERABILIDADE: sem proteção CSRF -->
    <form id="loginForm" onsubmit="return doLogin(event)">
        <input id="usuario" name="usuario" placeholder="Usuário"><br>
        <input id="senha" name="senha" type="password" placeholder="Senha"><br>
        <button type="submit">Entrar</button>
    </form>
    <p><a href="index.html">Voltar</a></p>

    <script>
        function doLogin(event) {
            event.preventDefault();
            const u = document.getElementById('usuario').value;
            const s = document.getElementById('senha').value;
            const msg = document.getElementById('msg');

            // ❌ VULNERABILIDADE PROPOSITAL: credencial hardcoded no JS
            if (u === 'admin' && s === 'admin123') {
                window.location.href = 'index.html';
            } else {
                // ❌ VULNERABILIDADE PROPOSITAL: XSS via innerHTML sem sanitização
                msg.innerHTML = "<p class='err'>Usuário '" + u + "' inválido!</p>";
            }
            return false;
        }

        // ❌ VULNERABILIDADE: lê parâmetro da URL e exibe sem sanitização (XSS)
        const urlParams = new URLSearchParams(window.location.search);
        const errParam = urlParams.get('err');
        if (errParam) {
            document.getElementById('msg').innerHTML = errParam;
        }
    </script>
</body>
</html>
